<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedQueue - Test Google OAuth</title>
    <style>
      body {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background-color: #f8fafc;
        color: #334155;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .container {
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        padding: 40px;
        max-width: 500px;
        width: 100%;
        text-align: center;
      }
      h1 {
        color: #0284c7;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        color: #64748b;
        margin-bottom: 32px;
      }
      .google-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        color: #1f2937;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition:
          background-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
        box-sizing: border-box;
      }
      .google-btn:hover {
        background-color: #f9fafb;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      }
      .google-btn svg {
        margin-right: 12px;
        width: 20px;
        height: 20px;
      }
      .token-display {
        margin-top: 32px;
        text-align: left;
        display: none;
      }
      .token-display h3 {
        font-size: 14px;
        font-weight: 600;
        color: #0284c7;
        margin-bottom: 8px;
      }
      pre {
        background-color: #0f172a;
        color: #38bdf8;
        padding: 16px;
        border-radius: 8px;
        font-size: 12px;
        overflow-x: auto;
        max-height: 300px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MedQueue Platform</h1>
      <p>OAuth 2.0 Google Authentication Testing Utility</p>

      <a
        href="http://localhost:3000/api/v1/auth/google"
        class="google-btn"
        id="loginBtn"
      >
        <svg
          viewBox="0 0 24 24"
          width="20"
          height="20"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"
            fill="#EA4335"
          />
        </svg>
        Sign in with Google
      </a>

      <div class="token-display" id="tokenDisplay">
        <h3>Authentication Success Result:</h3>
        <pre id="jsonResult"></pre>
      </div>
    </div>

    <script>
      // Check if we came back from the login callback redirection with details
      const urlParams = new URLSearchParams(window.location.search);
      const accessToken = urlParams.get('token');
      const refreshToken = urlParams.get('refresh');

      if (accessToken && refreshToken) {
        // Hide the button and display our token payload
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('tokenDisplay').style.display = 'block';

        const payloadData = {
          message:
            'OAuth Callback successfully captured from URL query params!',
          tokens: {
            accessToken: accessToken,
            refreshToken: refreshToken,
          },
        };

        document.getElementById('jsonResult').textContent = JSON.stringify(
          payloadData,
          null,
          2,
        );
      }
    </script>
  </body>
</html>
